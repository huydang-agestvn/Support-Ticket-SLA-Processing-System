services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ticket-sla-postgres
    command: postgres -c timezone=Asia/Ho_Chi_Minh -c log_timezone=Asia/Ho_Chi_Minh
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_CONTAINER_PORT}"
    volumes:
      - ticket_sla_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-postgres
    command: postgres -c timezone=Asia/Ho_Chi_Minh -c log_timezone=Asia/Ho_Chi_Minh
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "${KEYCLOAK_DB_HOST_PORT}:5432"
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    command: start-dev
    ports:
      - "${KEYCLOAK_HOST_PORT}:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    depends_on:
      keycloak-db:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: ticket-sla-minio
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ticket-sla-api
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticket-sla-api
    ports:
      - "${APP_PORT}:${SERVER_PORT}"
    environment:
      APP_PORT: ${APP_PORT}
      SERVER_PORT: ${SERVER_PORT}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_SSLMODE: disable
      WORKER_POOL_SIZE: ${WORKER_POOL_SIZE}
      MAX_BATCH_SIZE: ${MAX_BATCH_SIZE}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_BASE_URL: ${DOCKER_KEYCLOAK_BASE_URL}
      KEYCLOAK_ISSUER: ${DOCKER_KEYCLOAK_ISSUER}
      KEYCLOAK_TOKEN_URL: ${DOCKER_KEYCLOAK_TOKEN_URL}
      KEYCLOAK_JWKS_URL: ${DOCKER_KEYCLOAK_JWKS_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MANAGER_EMAIL: ${MANAGER_EMAIL}

      AI_ENABLED: ${AI_ENABLED}
      AI_PROVIDER: ${AI_PROVIDER}
      AI_BASE_URL: ${AI_BASE_URL}
      AI_MODEL: ${AI_MODEL}
      AI_FALLBACK_CHAIN: ${AI_FALLBACK_CHAIN}
      AI_GROQ_BASE_URL: ${AI_GROQ_BASE_URL}
      AI_GROQ_API_KEY: ${AI_GROQ_API_KEY}
      AI_OPENROUTER_BASE_URL: ${AI_OPENROUTER_BASE_URL}
      AI_OPENROUTER_API_KEY: ${AI_OPENROUTER_API_KEY}
      AI_GEMINI_BASE_URL: ${AI_GEMINI_BASE_URL}
      AI_GEMINI_API_KEY: ${AI_GEMINI_API_KEY}
      AI_TIMEOUT_SECS: ${AI_TIMEOUT_SECS}
      AI_MAX_RETRIES: ${AI_MAX_RETRIES}
      AI_PROMPT_VERSION: ${AI_PROMPT_VERSION}
      TICKET_SAFETY_ML_URL: ${TICKET_SAFETY_ML_URL:-http://ticket-safety-ml:8000/score}
      TICKET_SAFETY_ML_TIMEOUT_SECS: ${TICKET_SAFETY_ML_TIMEOUT_SECS:-3}
    volumes:
      - app_logs:/app/logs
    command: sh -c "mkdir -p /app/logs && ./ticket-sla-api 2>&1 | tee /app/logs/app.log"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ticket-safety-ml:
    build: ./ticket-safety-ml
    ports:
      - "8001:8000"
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    container_name: ticket-sla-loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./logging/loki-config.yaml:/etc/loki/local-config.yaml:ro

  promtail:
    image: grafana/promtail:3.0.0
    container_name: ticket-sla-promtail
    volumes:
      - app_logs:/var/log/app:ro
      - ./logging/promtail-config.yaml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.0.0
    container_name: ticket-sla-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./logging/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki

volumes:
  ticket_sla_postgres_data:
  keycloak_postgres_data:
  minio_data:
  grafana_data:
  app_logs:
  huggingface_cache:
