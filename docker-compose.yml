services:
  postgres:
    image: postgres:16-alpine
    container_name: ticket-sla-postgres
    command: postgres -c timezone=Asia/Ho_Chi_Minh -c log_timezone=Asia/Ho_Chi_Minh
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Ho_Chi_Minh

    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_CONTAINER_PORT}"

    volumes:
      - ticket_sla_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-postgres
    command: postgres -c timezone=Asia/Ho_Chi_Minh -c log_timezone=Asia/Ho_Chi_Minh
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      TZ: Asia/Ho_Chi_Minh

    ports:
      - "${KEYCLOAK_DB_HOST_PORT}:5432"

    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak

    command: start-dev

    ports:
      - "${KEYCLOAK_HOST_PORT}:8080"

    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

    depends_on:
      keycloak-db:
        condition: service_healthy

  app:
    image: ticket-sla-api

    build:
      context: .
      dockerfile: Dockerfile

    container_name: ticket-sla-api

    ports:
      - "${APP_PORT}:${SERVER_PORT}"

    environment:
      APP_PORT: ${APP_PORT}
      SERVER_PORT: ${SERVER_PORT}

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_SSLMODE: disable

      WORKER_POOL_SIZE: ${WORKER_POOL_SIZE}
      MAX_BATCH_SIZE: ${MAX_BATCH_SIZE}

      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_BASE_URL: ${DOCKER_KEYCLOAK_BASE_URL}
      KEYCLOAK_ISSUER: ${DOCKER_KEYCLOAK_ISSUER}
      KEYCLOAK_TOKEN_URL: ${DOCKER_KEYCLOAK_TOKEN_URL}
      KEYCLOAK_JWKS_URL: ${DOCKER_KEYCLOAK_JWKS_URL}

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  ticket_sla_postgres_data:
  keycloak_postgres_data:
