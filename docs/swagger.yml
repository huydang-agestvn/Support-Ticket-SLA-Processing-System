                confidence_score: 0.65
                prompt_version: "v1.2.0"
                fallback_used: false
              - ticket_id: 457
                category: "Facilities"
                urgency_level: "low"
                sla_breach_risk: "low"
                reason_summary: "The employee's request text was highly ambiguous and caused an AI processing timeout. To ensure no disruption, I have successfully executed safety protocols and switched to Deterministic Keyword Matching Fallback to classify this ticket."
                recommended_next_action: "Please have a coordinator perform a quick manual review of the ticket body and layout. Since the AI confidence is based on keyword matching, verifying the specific facility items or maintenance location with the requester is recommended before dispatching a technician."
                confidence_score: 1.00
