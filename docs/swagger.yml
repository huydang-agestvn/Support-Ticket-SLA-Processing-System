openapi: 3.0.0
info:
  title: Support Ticket SLA Processing System API
  version: 1.0.0
  description: |
    RESTful API contract for the Internal Support Ticket & SLA Processing System. 
    This system manages the entire lifecycle of internal support tickets (IT, HR, Facilities, etc.) and tracks compliance with Service Level Agreements (SLAs).

    ### Key Features:
    * **Ticket Lifecycle Management**: Implements a strict Finite State Machine (FSM) state transition workflow.
    * **High-Throughput Batch Import**: Supports concurrent batch processing of historical ticket events via an in-memory worker pool, with comprehensive validation and automated audit logging to object storage (MinIO) for rejected events.
    * **Automated SLA Reporting**: Features an ETL pipeline that aggregates operational metrics, resolution times, and SLA breaches daily via scheduled cron jobs or CLI triggers.
    * **Enterprise Authentication & RBAC**: Secured via Keycloak Identity Provider (OAuth2/JWT) enforcing three functional roles: Requestor, Agent, and Manager.

    ### Response Standardization
    All responses adhere to a consistent wrapper format: `{ "success": boolean, "message": string, "data": object, "error": object }`.

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: Auth
    description: Authentication and token management APIs integrated with Keycloak Identity Provider.
  - name: Tickets
    description: Core ticket operations including creation, pagination, detailed lookup, and state machine transitions.
  - name: Ticket Events
    description: High-throughput asynchronous batch processing for importing historical ticket event trails.
  - name: Reports
    description: Operational SLA dashboards and daily metrics aggregation for management.
  - name: AI Assistant
    description: AI-powered analytical, automated triage, model evaluation metrics, and descriptive query assistants for support tickets.

paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate user credentials
      description: Exchanges a username and password for a Keycloak OAuth2 access token. This endpoint does not require authentication headers.
      operationId: login
      requestBody:
        $ref: "#/components/requestBodies/LoginRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/LoginSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/AuthProviderUnavailable"

  /tickets:
    post:
      tags:
        - Tickets
      summary: Create a new support ticket
      description: |
        Initializes a new support ticket in the default `new` state. 
        The `requestor_id` is automatically extracted from the authenticated user's JWT payload.
        
        **Required Roles**: Requestor, Manager.
      operationId: createTicket
      security:
        - OAuth2Password: []
      requestBody:
        $ref: "#/components/requestBodies/CreateTicketRequestBody"
      responses:
        "201":
          $ref: "#/components/responses/CreateTicketSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

    get:
      tags:
        - Tickets
      summary: List and filter tickets
      description: |
        Retrieves a paginated list of support tickets. Supports advanced server-side filtering by status, priority, and assignee.
        
        **Data Visibility Constraints**:
        * **Requestor**: Can only view tickets they personally created.
        * **Agent / Manager**: Can view all tickets across the system.
        
        **Required Roles**: Requestor, Agent, Manager.
      operationId: listTickets
      security:
        - OAuth2Password: []
      parameters:
        - $ref: "#/components/parameters/TicketStatusQuery"
        - $ref: "#/components/parameters/TicketPriorityQuery"
        - $ref: "#/components/parameters/AssigneeIdQuery"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          $ref: "#/components/responses/ListTicketsSuccess"
        "400":
          $ref: "#/components/responses/InvalidQueryParameters"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /tickets/{id}:
    get:
      tags:
        - Tickets
      summary: Retrieve ticket details
      description: |
        Fetches the complete details of a specific ticket by its ID, including its associated historical state transitions (Ticket Events audit log).
        
        **Data Visibility Constraints**:
        * **Requestor**: Access restricted to their own tickets.
        * **Agent / Manager**: Unrestricted access to all tickets.
        
        **Required Roles**: Requestor, Agent, Manager.
      operationId: getTicketById
      security:
        - OAuth2Password: []
      parameters:
        - $ref: "#/components/parameters/TicketId"
      responses:
        "200":
          $ref: "#/components/responses/GetTicketSuccess"
        "400":
          $ref: "#/components/responses/InvalidTicketId"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/TicketNotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /tickets/{id}/status:
    patch:
      tags:
        - Tickets
      summary: Update ticket status (FSM Transition)
      description: |
        Updates the operational status of an existing ticket. This endpoint strictly enforces the Finite State Machine (FSM) rules:
        * `new` → `assigned`, `cancelled` (requires `assignee_id` when moving to `assigned`).
        * `assigned` → `in_progress`, `cancelled`.
        * `in_progress` → `resolved`.
        * `resolved` → `closed`.
        
        Terminal states (`closed`, `cancelled`) cannot transition further. Each successful change logs a record into the database audit trail within a single transaction.
        
        **Required Roles**: Agent, Manager.
      operationId: updateTicketStatus
      security:
        - OAuth2Password: []
      parameters:
        - $ref: "#/components/parameters/TicketId"
      requestBody:
        $ref: "#/components/requestBodies/UpdateTicketStatusRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/UpdateTicketStatusSuccess"
        "400":
          $ref: "#/components/responses/InvalidStatusTransition"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/TicketNotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /ticket-events/import:
    post:
      tags:
        - Ticket Events
      summary: Asynchronously batch import ticket events
      description: |
        Imports a large batch of historical state transition logs. Accepts either a multipart file upload (`.csv` or `.json`) or a raw JSON array.
        
        Processing utilizes an in-memory concurrent worker pool to model and validate state machines concurrently per ticket. Valid logs are committed in bulk transactions, while validation failures generate a detailed CSV error report streamed directly to MinIO storage.
        
        **Required Roles**: Agent, Manager.
      operationId: importTicketEvents
      security:
        - OAuth2Password: []
      requestBody:
        $ref: "#/components/requestBodies/ImportTicketEventsRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/ImportTicketEventsSuccess"
        "400":
          $ref: "#/components/responses/InvalidImportInput"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /reports/daily:
    get:
      tags:
        - Reports
      summary: Get daily SLA performance report
      description: |
        Retrieves consolidated SLA tracking metrics and KPIs for a specific date. Data includes volume counts, priority distributions, and average resolution times compiled via the ETL pipeline.
        
        **Required Roles**: Manager.
      operationId: getDailyReport
      security:
        - OAuth2Password: []
      parameters:
        - $ref: "#/components/parameters/ReportDateQuery"
      responses:
        "200":
          $ref: "#/components/responses/GetDailyReportSuccess"
        "400":
          $ref: "#/components/responses/InvalidDateFormat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "504":
          description: Report not found for the requested date.
        "500":
          $ref: "#/components/responses/InternalServerError"

  /ai/tickets/{id}/triage:
    post:
      tags:
        - AI Assistant
      summary: Perform AI-driven triage and SLA risk analysis for a single ticket
      description: |
        Executes automated category classification (such as IT, HR, Facilities), evaluates urgency levels, predicts potential SLA breach risks, and provides tailored recommended next actions for a specific ticket identifier.
        
        The result integrates deterministic system rules with generative evaluation data.
        
        **Required Roles**: Agent, Manager.
      operationId: triageSingleTicket
      security:
        - OAuth2Password: []
      parameters:
        - $ref: "#/components/parameters/TicketId"
      responses:
        "200":
          description: AI triage analysis compiled and structured successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AITriageResponse"
        "400":
          $ref: "#/components/responses/AITriageSingleBadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/AITriageTicketNotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /ai/tickets/triage:batch:
    post:
      tags:
        - AI Assistant
      summary: Dispatch bulk ticket triage and SLA breach risk scanning
      description: |
        Allows system administrators (Support Leads or Managers) to process a large batch of open (non-closed and non-cancelled) support tickets.
        
        The in-memory worker pool evaluates the collections concurrently to detect early indicators of imminent SLA breaches, enabling optimized, preemptive resource reallocation and workload adjustments.
        
        **Required Roles**: Manager.
      operationId: triageBatchTickets
      security:
        - OAuth2Password: []
      requestBody:
        $ref: "#/components/requestBodies/AIBatchTriageRequestBody"
      responses:
        "200":
          description: Batch triage matrix analysis dispatched and evaluated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIBatchTriageResponse"
        "400":
          $ref: "#/components/responses/AIBatchTriageBadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /ai/tickets/{id}/triage/latest:
    get:
      tags:
        - AI Assistant
      summary: Fetch the latest stored AI triage results for a ticket
      description: |
        Provides pre-existing AI analytical triage data compiled from the most recent assessment job sequence for a specific ticket identifier.
        
        This drastically minimizes external LLM operational token costs, bypasses redundant upstream payload generation cycles, and optimizes server network response latency limits.
        
        **Required Roles**: Agent, Manager.
      operationId: getLatestTicketTriage
      security:
        - OAuth2Password: []
      parameters:
        - $ref: "#/components/parameters/TicketId"
      responses:
        "200":
          description: Previously persisted AI triage analytical records retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AITriageResponse"
        "400":
          $ref: "#/components/responses/AITriageSingleBadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/AITriageTicketNotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /ai/evaluations/ticket-triage:
    post:
      tags:
        - AI Assistant
      summary: Execute an automated batch evaluation run for ticket triage datasets
      description: |
        Triggers an isolated testing pipeline sequence over predefined baseline ground-truth data cases. 
        
        Compiles analytical assessment indicators regarding operational classification accuracy, system performance latency milestones, structural model token payloads, and aggregated infrastructure billing cost schemas. This assists system maintainers in qualifying prompt design adjustments before production environment provisioning.
        
        **Required Roles**: Manager.
      operationId: runTriageEvaluation
      security:
        - OAuth2Password: []
      requestBody:
        $ref: "#/components/requestBodies/AIEvaluationRequestBody"
      responses:
        "200":
          description: Evaluation matrix sequence metrics finalized and parsed successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIEvaluationResponse"
        "400":
          $ref: "#/components/responses/AIEvaluationBadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    OAuth2Password:
      type: oauth2
      flows:
        password:
          tokenUrl: http://localhost:8080/api/v1/auth/login
          scopes: {}

  parameters:
    TicketId:
      name: id
      in: path
      required: true
      description: The unique auto-incrementing database identifier of the support ticket.
      schema:
        type: integer
        minimum: 1
      example: 9

    TicketStatusQuery:
      name: status
      in: query
      required: false
      description: Filters the results matching a specific lifecycle status.
      schema:
        $ref: "#/components/schemas/TicketStatus"

    TicketPriorityQuery:
      name: priority
      in: query
      required: false
      description: Filters the results matching an SLA urgency classification level.
      schema:
        $ref: "#/components/schemas/TicketPriority"

    AssigneeIdQuery:
      name: assignee_id
      in: query
      required: false
      description: Filters tickets assigned to a specific processing agent using their Keycloak UUID string format.
      schema:
        type: string
      example: 9ee00625-0436-4f11-8bb1-b9e4f3f7bf88

    PageQuery:
      name: page
      in: query
      required: false
      description: Page index number for server-side pagination.
      schema:
        type: integer
        minimum: 1
        default: 1
      example: 1

    LimitQuery:
      name: limit
      in: query
      required: false
      description: Maximum number of ticket items to return per page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
      example: 10

    ReportDateQuery:
      name: date
      in: query
      required: false
      description: Target date partition for the compiled report schema. Must follow the standard `YYYY-MM-DD` date layout.
      schema:
        type: string
        format: date
      example: "2026-05-19"

  requestBodies:
    LoginRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/LoginRequest"
          example:
            username: requestor-1
            password: "123123"

    CreateTicketRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateTicketRequest"
          example:
            requestor_id: 0a5389df-ba3a-4494-a095-126d05c7c2e7
            title: Cannot access internal system
            description: User cannot access internal support system
            priority: low
            sla_due_at: "2026-05-25T15:57:38.248399+07:00"

    UpdateTicketStatusRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UpdateTicketStatusRequest"
          example:
            status: in_progress
            note: Start processing ticket

    ImportTicketEventsRequestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: "#/components/schemas/TicketEventImportFileRequest"
        application/json:
          schema:
            $ref: "#/components/schemas/TicketEventImportJsonRequest"
          example:
            - ticket_id: 19
              note: Ticket assigned to support agent
              from_status: new
              to_status: assigned
              assignee_id: 9ee00625-0436-4f11-8bb1-b9e4f3f7bf88
              created_at: "2026-05-30T17:59:49.129094074+07:00"
            - ticket_id: 19
              note: Ticket moved to in progress
              from_status: assigned
              to_status: in_progress
              assignee_id: 9ee00625-0436-4f11-8bb1-b9e4f3f7bf88
              created_at: "2026-06-01T17:59:49.129094074+07:00"

    AIBatchTriageRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AIBatchTriageRequest"
          example:
            ticket_ids: [455, 456, 457, 458]

    AIEvaluationRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AIEvaluationRequest"
          example:
            prompt_version: "v2.1.0-triage-assistant"
            evaluation_case_ids: [1, 2, 3, 4, 5, 12, 20]

  responses:
    LoginSuccess:
      description: Authentication successful. Keycloak tokens granted.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/LoginSuccessResponse"
          example:
            success: true
            message: Login successfully
            data:
              access_token: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
              token_type: Bearer
              expires_in: 300

    CreateTicketSuccess:
      description: Support ticket compiled and stored successfully.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateTicketResponse"

    ListTicketsSuccess:
      description: Paginated query list retrieved successfully.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ListTicketsResponse"

    GetTicketSuccess:
      description: Detailed metadata record and nested audit log array loaded successfully.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GetTicketResponse"

    UpdateTicketStatusSuccess:
      description: State transaction committed and operational audit log recorded successfully.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SuccessMessageResponse"
          example:
            success: true
            message: Ticket status updated successfully

    ImportTicketEventsSuccess:
      description: Async stream ingestion completed. Partial rejections are outputted via the report payload mapping.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TicketEventImportResponse"

    GetDailyReportSuccess:
      description: Extracted data metrics mapping loaded successfully.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DailyReportResponse"

    AITriageSingleBadRequest:
      description: Invalid ticket key data representation constraints.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidId:
              summary: Invalid Input Key
              value:
                success: false
                error:
                  code: INVALID_INPUT
                  message: The target path identifier variable violates mathematical layout logic rules.
            invalidTransitionState:
              summary: Invalid State Flow Boundary
              value:
                success: false
                error:
                  code: INVALID_FLOW_TICKET
                  message: The requested processing target references a ticket residing in a terminal status boundary.

    AITriageTicketNotFound:
      description: Resource verification row scanning yielded zero entities.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: TICKET_NOT_FOUND
              message: The matching ticket index row was not uncovered inside system data partitions.

    AIBatchTriageBadRequest:
      description: Structural array validation anomalies encountered during ingestion processing.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            malformedJson:
              summary: Malformed Request Body
              value:
                success: false
                error:
                  code: INVALID_REQUEST_BODY
                  message: Parsing aborted due to corrupt payload or syntax structure compilation mismatch.
            emptyBatchArray:
              summary: Empty Ingestion Array
              value:
                success: false
                error:
                  code: EMPTY_BATCH
                  message: Execution denied. The batch ingestion ticket identification array contains no items.
            sizeConstraintsExceeded:
              summary: Batch Payload Upper Constraints Exceeded
              value:
                success: false
                error:
                  code: BATCH_TOO_LARGE
                  message: The ingestion tracking sequence limits are exceeded. Reduce the slice payload array footprint.

    AIEvaluationBadRequest:
      description: Validation failures during test dataset sequence binding operations.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidBodyLayout:
              summary: Corrupt JSON Layout
              value:
                success: false
                error:
                  code: INVALID_REQUEST_BODY
                  message: Unable to bind model body entity values due to structural formatting corruption.
            missingPromptMapping:
              summary: Validation Constraints Failure
              value:
                success: false
                error:
                  code: VALIDATION_ERROR
                  message: The tracking field 'prompt_version' is structural and must be explicitly declared.
            emptyCasesMapping:
              summary: Missing Identification Target Array
              value:
                success: false
                error:
                  code: INVALID_INPUT
                  message: Provided evaluation target array identifier sequences must contain active entries.

    BadRequest:
      description: Malformed JSON syntax structure or invalid model validation failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: INVALID_REQUEST_BODY
              message: invalid request body

    InvalidQueryParameters:
      description: Provided request parameter arguments failed URL validation parsing rules.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: INVALID_QUERY_PARAMETERS
              message: invalid query parameters

    InvalidTicketId:
      description: The path variable integer does not point to a valid index schema minimum boundary.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: INVALID_INPUT
              message: invalid ticket id

    InvalidStatusTransition:
      description: Requested update violates strict validation constraints governed by the Finite State Machine ruleset.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: INVALID_STATUS_TRANSITION
              message: invalid status transition from new to in_progress

    InvalidImportInput:
      description: Structural integrity checks failed during ingestion due to payload constraint violations.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            emptyBody:
              summary: Empty request body
              value:
                success: false
                error:
                  code: EMPTY_REQUEST_BODY
                  message: request body is empty
            unsupportedFileFormat:
              summary: Unsupported file format
              value:
                success: false
                error:
                  code: UNSUPPORTED_FILE_FORMAT
                  message: unsupported file format
            batchTooLarge:
              summary: Batch size exceeds limit
              value:
                success: false
                error:
                  code: BATCH_TOO_LARGE
                  message: batch size exceeds maximum limit

    InvalidDateFormat:
      description: Provided query string argument fails the exact date string layout check requirements.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: INVALID_INPUT
              message: invalid date format, expected YYYY-MM-DD

    InvalidCredentials:
      description: Identity verification failed against Keycloak. Invalid username or password payload.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: invalid username or password

    Unauthorized:
      description: Access token verification failed. The Authorization Bearer token is missing, expired, or structural token validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: invalid authorization header format

    Forbidden:
      description: Authenticated subject possesses valid signature claims but lacks the business RBAC roles required for this resource operation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: FORBIDDEN
              message: "forbidden: insufficient role"

    TicketNotFound:
      description: Resource resolution failed. No ticket row maps to the provided query index.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: TICKET_NOT_FOUND
              message: ticket not found

    InternalServerError:
      description: The server encountered an unexpected condition which prevented it from fulfilling the request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: INTERNAL_SERVER_ERROR
              message: internal server error

    AuthProviderUnavailable:
      description: Upstream connection timeout or routing failure to Keycloak server endpoint clusters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: AUTH_PROVIDER_UNAVAILABLE
              message: authentication provider unavailable

  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: requestor-1
        password:
          type: string
          format: password
          example: "123123"

    OAuthTokenResponse:
      type: object
      properties:
        access_token:
          type: string
          example: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
        refresh_token:
          type: string
          example: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 300

    LoginSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponseBase"
        - type: object
