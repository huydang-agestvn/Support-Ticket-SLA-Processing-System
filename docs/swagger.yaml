host: localhost:8080
info:
  contact: {}
  description: REST API for support ticket SLA processing system.
  title: Support Ticket SLA Processing System API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Login with username and password through Keycloak
      parameters:
      - description: Username
        in: formData
        name: username
        required: true
        type: string
      - description: Password
        format: password
        in: formData
        name: password
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Login successfully
          schema:
            $ref: '#/definitions/swagger_response.LoginSuccessResponseDoc'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/swagger_response.BadRequestResponseDoc'
        "401":
          description: Invalid username or password
          schema:
            $ref: '#/definitions/swagger_response.UnauthorizedResponseDoc'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/swagger_response.InternalServerErrorResponseDoc'
        "503":
          description: Authentication provider unavailable
          schema:
            $ref: '#/definitions/swagger_response.ServiceUnavailableResponseDoc'
      summary: Login
      tags:
      - Auth
  /reports/daily:
    get:
      consumes:
      - application/json
      description: Get daily ticket report by date
      parameters:
      - description: Report date in YYYY-MM-DD format
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Get daily report successfully
          schema:
            $ref: '#/definitions/common.SuccessResponseDoc'
        "400":
          description: Invalid date format
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
        "404":
          description: Report not found
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Get daily report
      tags:
      - Reports
  /ticket-events/import:
    post:
      consumes:
      - multipart/form-data
      description: Import ticket events in batch from a CSV or JSON file. The file
        must be uploaded using the `file` field.
      parameters:
      - description: CSV or JSON file to import
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Import ticket events successfully
          schema:
            $ref: '#/definitions/swagger_response.ImportTicketEventsSuccessResponseDoc'
        "400":
          description: Invalid import input
          schema:
            $ref: '#/definitions/swagger_response.BadRequestResponseDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/swagger_response.UnauthorizedResponseDoc'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/swagger_response.InternalServerErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Import ticket events
      tags:
      - Ticket Events
  /tickets:
    get:
      consumes:
      - application/json
      description: Get list of tickets with optional filters and pagination
      parameters:
      - description: Filter by ticket status
        enum:
        - new
        - assigned
        - in_progress
        - resolved
        - closed
        - cancelled
        in: query
        name: status
        type: string
      - description: Filter by ticket priority
        enum:
        - low
        - medium
        - high
        in: query
        name: priority
        type: string
      - description: Filter by assignee ID
        in: query
        name: assignee_id
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Number of items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Get tickets successfully
          schema:
            $ref: '#/definitions/swagger_response.ListTicketsSuccessResponseDoc'
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/swagger_response.BadRequestResponseDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/swagger_response.UnauthorizedResponseDoc'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/swagger_response.InternalServerErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: List tickets
      tags:
      - Tickets
    post:
      consumes:
      - application/json
      description: Create a new support ticket
      parameters:
      - description: Create ticket request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.CreateTicketReq'
      produces:
      - application/json
      responses:
        "201":
          description: Ticket created successfully
          schema:
            $ref: '#/definitions/swagger_response.CreateTicketSuccessResponseDoc'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/swagger_response.BadRequestResponseDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/swagger_response.UnauthorizedResponseDoc'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/swagger_response.InternalServerErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Create ticket
      tags:
      - Tickets
  /tickets/{id}:
    get:
      consumes:
      - application/json
      description: Get ticket detail by ID
      parameters:
      - description: Ticket ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Get ticket successfully
          schema:
            $ref: '#/definitions/swagger_response.GetTicketDetailSuccessResponseDoc'
        "400":
          description: Invalid ticket ID
          schema:
            $ref: '#/definitions/swagger_response.ErrorResponseDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/swagger_response.UnauthorizedResponseDoc'
        "404":
          description: Ticket not found
          schema:
            $ref: '#/definitions/swagger_response.TicketNotFoundResponseDoc'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/swagger_response.InternalServerErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Get ticket detail
      tags:
      - Tickets
  /tickets/{id}/status:
    patch:
      consumes:
      - application/json
      description: Update status of a ticket by ID
      parameters:
      - description: Ticket ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update status request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.UpdateStatusReq'
      produces:
      - application/json
      responses:
        "200":
          description: Ticket status updated successfully
          schema:
            $ref: '#/definitions/swagger_response.UpdateTicketStatusSuccessResponseDoc'
        "400":
          description: Invalid request body or invalid status transition
          schema:
            $ref: '#/definitions/swagger_response.BadRequestResponseDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/swagger_response.UnauthorizedResponseDoc'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/swagger_response.ForbiddenResponseDoc'
        "404":
          description: Ticket not found
          schema:
            $ref: '#/definitions/swagger_response.TicketNotFoundResponseDoc'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/swagger_response.InternalServerErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Update ticket status
      tags:
      - Tickets
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
