basePath: /api/v1
definitions:
  common.ErrorDetailDoc:
    properties:
      field:
        example: field_name
        type: string
      message:
        example: validation error message
        type: string
    type: object
  common.ErrorDoc:
    properties:
      code:
        example: ERROR_CODE
        type: string
      details:
        items:
          $ref: '#/definitions/common.ErrorDetailDoc'
        type: array
      message:
        example: error message
        type: string
      status:
        example: 400
        type: integer
    type: object
  common.ErrorResponseDoc:
    properties:
      error:
        $ref: '#/definitions/common.ErrorDoc'
      success:
        example: false
        type: boolean
    type: object
  common.SuccessMessageResponseDoc:
    properties:
      message:
        example: operation completed successfully
        type: string
      success:
        example: true
        type: boolean
    type: object
  common.SuccessResponseDoc:
    properties:
      data: {}
      message:
        example: success
        type: string
      success:
        example: true
        type: boolean
    type: object
  domain.Priority:
    enum:
    - low
    - medium
    - high
    type: string
    x-enum-varnames:
    - PriorityLow
    - PriorityMedium
    - PriorityHigh
  domain.TicketStatus:
    enum:
    - new
    - assigned
    - in_progress
    - resolved
    - closed
    - cancelled
    type: string
    x-enum-varnames:
    - StatusNew
    - StatusAssigned
    - StatusInProgress
    - StatusResolved
    - StatusClosed
    - StatusCancelled
  request.CreateTicketReq:
    properties:
      description:
        type: string
      priority:
        $ref: '#/definitions/domain.Priority'
      sla_due_at:
        type: string
      title:
        type: string
    type: object
  request.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  request.UpdateStatusReq:
    properties:
      note:
        type: string
      status:
        $ref: '#/definitions/domain.TicketStatus'
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API for support ticket SLA processing system.
  title: Support Ticket SLA Processing System API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login with username and password through Keycloak
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successfully
          schema:
            $ref: '#/definitions/common.SuccessResponseDoc'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
        "401":
          description: Invalid username or password
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
      summary: Login
      tags:
      - Auth
  /reports/daily:
    get:
      consumes:
      - application/json
      description: Get daily ticket report by date
      parameters:
      - description: Report date in YYYY-MM-DD format
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Get daily report successfully
          schema:
            $ref: '#/definitions/common.SuccessResponseDoc'
        "400":
          description: Invalid date format
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
        "404":
          description: Report not found
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Get daily report
      tags:
      - Reports
  /ticket-events/import:
    post:
      consumes:
      - multipart/form-data
      - application/json
      description: Import ticket events in batch. Accepts a multipart file upload
        (CSV or JSON) via the `file` field, or a raw JSON body.
      parameters:
      - description: CSV or JSON file to import
        in: formData
        name: file
        type: file
      - description: Raw JSON array (when not using file upload)
        in: body
        name: request
        schema:
          items:
            additionalProperties: true
            type: object
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: Import ticket events successfully
          schema:
            $ref: '#/definitions/common.SuccessResponseDoc'
        "400":
          description: Invalid import input
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Import ticket events
      tags:
      - ticket-events
  /tickets:
    get:
      consumes:
      - application/json
      description: Get tickets with filters and pagination
      parameters:
      - description: Filter by ticket status
        in: query
        name: status
        type: string
      - description: Filter by priority
        in: query
        name: priority
        type: string
      - description: Filter by assignee ID
        in: query
        name: assignee_id
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Number of items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Get tickets successfully
          schema:
            $ref: '#/definitions/common.SuccessResponseDoc'
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: List tickets
      tags:
      - Tickets
    post:
      consumes:
      - application/json
      description: Create a new support ticket
      parameters:
      - description: Create ticket request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.CreateTicketReq'
      produces:
      - application/json
      responses:
        "201":
          description: Create ticket successfully
          schema:
            $ref: '#/definitions/common.SuccessResponseDoc'
        "400":
          description: Invalid request body or invalid priority
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Create ticket
      tags:
      - Tickets
  /tickets/{id}:
    get:
      consumes:
      - application/json
      description: Get ticket detail by ID
      parameters:
      - description: Ticket ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Get ticket successfully
          schema:
            $ref: '#/definitions/common.SuccessResponseDoc'
        "400":
          description: Invalid ticket ID
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
        "404":
          description: Ticket not found
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Get ticket detail
      tags:
      - Tickets
  /tickets/{id}/status:
    patch:
      consumes:
      - application/json
      description: Update status of a ticket by ID
      parameters:
      - description: Ticket ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update status request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.UpdateStatusReq'
      produces:
      - application/json
      responses:
        "200":
          description: Ticket status updated successfully
          schema:
            $ref: '#/definitions/common.SuccessMessageResponseDoc'
        "400":
          description: Invalid request body or invalid status transition
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
        "404":
          description: Ticket not found
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.ErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Update ticket status
      tags:
      - Tickets
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
